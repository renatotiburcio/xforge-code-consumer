              - heading "Settings" [level=1] [ref=e164]
              - paragraph [ref=e165]: The VS Code extension can be configured through the Settings window, opened by pressing the gear icon in Kilo Code. Changes apply across extension surfaces, including the sidebar and Agent Manager. The CLI can also use the same JSONC config files when you use it directly.
              - heading "Configuring with the Agent" [level=2] [ref=e166]
              - paragraph [ref=e167]:
                - text: The fastest way to change your Kilo configuration is to ask the agent to do it for you. The agent has a built-in skill that understands the full
                - code [ref=e168]: kilo.jsonc
                - text: schema and can read, create, and update your config files directly.
              - paragraph [ref=e169]:
                - strong [ref=e170]: "Examples of things you can ask:"
              - list [ref=e171]:
                - listitem [ref=e172]: "\"Switch my default model to Claude Sonnet\""
                - listitem [ref=e173]: "\"Disable the OpenAI and Groq providers\""
                - listitem [ref=e174]: "\"Set up an MCP server for Figma\""
                - listitem [ref=e175]: "\"Auto-approve all read and glob operations\""
                - listitem [ref=e176]: "\"Create a custom agent for code review\""
              - paragraph [ref=e177]: The agent will edit the appropriate config file (global or project-level) and explain what it changed. This works in both the CLI and VS Code extension.
              - generic [ref=e178]:
                - generic [ref=e179]:
                  - generic [ref=e180]: 💡
                  - generic [ref=e181]: Tip
                - paragraph [ref=e183]: This is especially useful for complex configuration like custom model definitions, MCP server setup, or permission patterns — the agent knows the correct syntax and will validate the config for you.
              - heading "Managing Settings" [level=2] [ref=e184]
              - generic [ref=e185]:
