                    - cell ".kilo/run-script, .kilo/run-script.sh" [ref=e537]:
                      - code [ref=e538]: .kilo/run-script
                      - text: ","
                      - code [ref=e539]: .kilo/run-script.sh
                  - row "Windows .kilo/run-script.ps1, .kilo/run-script.cmd, .kilo/run-script.bat" [ref=e540]:
                    - cell "Windows" [ref=e541]
