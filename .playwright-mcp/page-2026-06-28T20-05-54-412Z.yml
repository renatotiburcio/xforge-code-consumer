              - heading "Limitations" [level=2] [ref=e269]
              - list [ref=e270]:
                - listitem [ref=e271]:
                  - strong [ref=e272]: Windows is not supported.
                - listitem [ref=e273]:
                  - text: Local MCP servers and plugin hooks are
                  - strong [ref=e274]: not
                  - text: covered by the network restriction.
                - listitem [ref=e275]:
                  - text: File
                  - strong [ref=e276]: reads
                  - text: are not confined — only writes and shell command effects are.
                - listitem [ref=e277]: Writable file handles are unavailable while the sandbox is active; writes are performed through a sandboxed worker, so some tools that open files for writing may behave differently.
