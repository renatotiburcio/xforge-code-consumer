            - paragraph [ref=e99]:
              - text: A few weeks ago,
              - link "we shipped a pre-release version" [ref=e100] [cursor=pointer]:
                - /url: https://blog.kilo.ai/p/we-completely-rebuilt-the-kilo-vs-code-extension
              - text: of the completely rebuilt Kilo Code extension for VS Code, built on OpenCode server — a portable, open-source core that isn’t tied to any single editor. Today, that rebuilt extension is leaving pre-release and becoming the
              - strong [ref=e101]: new default Kilo Code experience in VS Code
              - text: for all users.
            - paragraph [ref=e102]: This is the biggest change to the VS Code extension since launch. With OpenCode server at its core, Kilo now shares the same engine across VS Code, the CLI, and Cloud Agents, so improvements to the core benefit every surface at once.
            - paragraph [ref=e103]: If you already have Kilo Code installed, this update will roll out through the normal extension update path. If auto-update is enabled, nothing else is required.
            - figure [ref=e105]:
              - link [ref=e106]:
                - /url: https://substackcdn.com/image/fetch/$s_!8-F3!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F0c6759cb-66c8-46d3-b5f4-8bdfaa4192fb_2400x1260.png
                - generic [ref=e110]:
                  - button [ref=e111] [cursor=pointer]:
                    - img [ref=e112]
                  - button [ref=e114] [cursor=pointer]:
                    - img [ref=e115]
            - heading "Why We Rebuilt It Link" [level=2] [ref=e116]:
              - text: Why We Rebuilt It
              - button "Link" [ref=e119] [cursor=pointer]:
                - img [ref=e120]
            - paragraph [ref=e123]: The previous extension served over 2.2 million developers and worked well. But under the hood, every Kilo surface — CLI, JetBrains, and Cloud Agents — was still running VS Code internals, whether it needed them or not. That created a ceiling on what we could build.
            - paragraph [ref=e124]:
              - text: When we rebuilt the CLI on
              - link "OpenCode" [ref=e125] [cursor=pointer]:
                - /url: https://github.com/anomalyco/opencode
              - text: server — an MIT-licensed, open-source foundation for agentic coding — we saw the opportunity to fix this at the root. Instead of patching around VS Code dependencies, we built a portable core that runs natively on every surface. The new VS Code extension shares the same engine as Kilo CLI. One experience that follows you from terminal to editor and back.
            - paragraph [ref=e126]: "For users, that translates into something simple: Kilo feels faster, more consistent, and more predictable wherever you use it."
            - heading "What’s New Link" [level=2] [ref=e127]:
              - text: What’s New
              - button "Link" [ref=e130] [cursor=pointer]:
