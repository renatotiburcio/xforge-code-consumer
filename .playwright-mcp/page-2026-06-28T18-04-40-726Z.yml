                      - code [ref=e543]: .kilo/run-script.ps1
                      - text: ","
                      - code [ref=e544]: .kilo/run-script.cmd
                      - text: ","
                      - code [ref=e545]: .kilo/run-script.bat
              - paragraph [ref=e546]:
                - text: For example, on macOS / Linux create
                - code [ref=e547]: .kilo/run-script
                - text: ":"
              - generic [ref=e548]:
                - button "Copy code to clipboard" [ref=e549] [cursor=pointer]:
                  - generic [ref=e550]: 
                - generic [ref=e551]: "#!/bin/sh npm run dev"
              - paragraph [ref=e552]:
                - text: For projects that need a unique dev-server port per worktree, assign the port in the run script and make your app read it from
                - code [ref=e553]: PORT
                - text: ":"
              - generic [ref=e554]:
                - button "Copy code to clipboard" [ref=e555] [cursor=pointer]:
                  - generic [ref=e556]: 
                - generic [ref=e557]:
                  - text: "#!/bin/sh set -e # Pick a deterministic port from the worktree path so each worktree keeps the same URL. sum="
                  - generic [ref=e558]:
                    - text: $(cksum <<
                    - generic [ref=e559]:
                      - text: EOF
                      - generic [ref=e560]: "| cut -d ' ' -f 1"
                      - text: $WORKTREE_PATH EOF
                    - text: )
                  - text: export PORT=
                  - generic [ref=e561]: $((4000 + (sum % 1000))
                  - text: ) echo
                  - generic [ref=e562]: "\"Starting dev server on http://localhost:$PORT\""
                  - text: npm run dev
              - paragraph [ref=e563]:
                - text: If your stack supports
                - code [ref=e564]: PORT=0
                - text: ", you can also let the OS pick a free port instead. Prefer app-side env support where possible, then use the run script to provide per-worktree defaults."
              - paragraph [ref=e565]:
                - text: The next time you click the run button (or press
                - code [ref=e566]: Cmd+E
                - text: /
                - code [ref=e567]: Ctrl+E
                - text: ), the script runs in the selected worktree's directory.
              - generic [ref=e568]:
                - generic [ref=e569]:
                  - generic [ref=e570]: 💡
                  - generic [ref=e571]: Tip
                - paragraph [ref=e573]: If no run script exists yet, clicking the run button opens a template file for you to fill in.
