              - heading "Sandboxing" [level=1] [ref=e164]
              - paragraph [ref=e165]: "The experimental sandbox runs agent shell commands and file-tool writes inside an OS-level sandbox that restricts filesystem writes to your project and Kilo state directories, and can block outbound network access from model-originated commands. It is an extra guardrail on top of the permission system: even if the agent is allowed to run a command, the operating system will deny writes outside the allowed roots."
              - generic [ref=e166]:
                - generic [ref=e167]:
                  - generic [ref=e168]: ⚠️
                  - generic [ref=e169]: Warning
                - paragraph [ref=e171]: Sandboxing is experimental. Behavior may change between releases, and it is not available on Windows.
              - heading "How it works" [level=2] [ref=e172]
              - paragraph [ref=e173]: "When enabled, the agent's shell commands and file-write tools run confined to a small set of writable directories:"
              - list [ref=e174]:
                - listitem [ref=e175]:
                  - text: Your
                  - strong [ref=e176]: project directory
                  - text: (and its worktree, when running in a linked git worktree)
                - listitem [ref=e177]:
                  - text: Kilo
                  - strong [ref=e178]: state directories
                  - text: ": data, cache, config, state, tmp, bin, log, and repos"
              - paragraph [ref=e179]:
                - text: Everything else is denied at the OS level. File
                - strong [ref=e180]: reads are not confined
                - text: — the agent can still read anywhere it has permission to. The
                - code [ref=e181]: .git
                - text: directory is always denied for writes, regardless of location.
              - paragraph [ref=e182]: "When network restriction is on (the default), outbound network access is blocked for:"
              - list [ref=e183]:
                - listitem [ref=e184]: Shell commands originated by the model
                - listitem [ref=e185]: First-party HTTP tools (for example web fetch and browser tools)
              - paragraph [ref=e186]:
                - text: The following are
                - strong [ref=e187]: not
                - text: "affected by the network restriction:"
              - list [ref=e188]:
                - listitem [ref=e189]:
                  - strong [ref=e190]: Provider and model inference traffic
                  - text: — your LLM API calls keep working
                - listitem [ref=e191]:
                  - strong [ref=e192]: Local MCP servers and plugin hooks
                  - text: — these run outside the restriction
              - heading "Enable the sandbox" [level=2] [ref=e193]
              - paragraph [ref=e194]:
                - text: The sandbox is off by default. Enable it under the
                - code [ref=e195]: experimental
