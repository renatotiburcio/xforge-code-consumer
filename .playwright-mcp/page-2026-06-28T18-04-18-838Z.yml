            - article [ref=e186]:
              - heading "Kilo Code for VS Code" [level=1] [ref=e187]
              - paragraph [ref=e188]:
                - text: "Kilo Code is available as two VS Code extensions: the"
                - strong [ref=e189]: VSCode (Legacy)
                - text: extension and the current
                - strong [ref=e190]: VSCode
                - text: version built on Kilo's shared agent runtime.
              - generic [ref=e191]:
                - generic [ref=e192]:
                  - button "VSCode" [ref=e193]
                  - button "VSCode (Legacy)" [ref=e194]
                - generic [ref=e195]:
                  - heading "Installation" [level=2] [ref=e196]
                  - list [ref=e197]:
                    - listitem [ref=e198]: Open VS Code
                    - listitem [ref=e199]:
                      - text: Go to Extensions (
                      - code [ref=e200]: Ctrl+Shift+X
                      - text: /
                      - code [ref=e201]: Cmd+Shift+X
                      - text: )
                    - listitem [ref=e202]: Search for "Kilo Code"
                    - listitem [ref=e203]:
                      - text: Click the dropdown arrow next to
                      - strong [ref=e204]: Install
                      - text: and select
                      - strong [ref=e205]: Install Pre-Release Version
                  - paragraph [ref=e206]: The extension includes its own embedded runtime. No separate Kilo CLI installation is required.
                  - heading "Key Features" [level=2] [ref=e207]
                  - paragraph [ref=e208]: "Key features include:"
                  - list [ref=e209]:
                    - listitem [ref=e210]:
                      - strong [ref=e211]: SolidJS-based UI
                      - text: — Rebuilt sidebar with a modern component architecture
                    - listitem [ref=e212]:
                      - strong [ref=e213]:
                        - link "JSONC config files" [ref=e214] [cursor=pointer]:
                          - /url: /docs/getting-started/settings
                      - text: — Portable settings in
                      - code [ref=e215]: kilo.jsonc
                      - text: instead of VS Code settings
                    - listitem [ref=e216]:
                      - strong [ref=e217]:
                        - link "Granular permissions" [ref=e218] [cursor=pointer]:
                          - /url: /docs/getting-started/settings/auto-approving-actions
                      - text: — Per-tool permission rules with glob patterns
                    - listitem [ref=e219]:
                      - strong [ref=e220]:
                        - link "Agents" [ref=e221] [cursor=pointer]:
                          - /url: /docs/code-with-ai/agents/using-agents
                      - text: — Customizable agents (
                      - code [ref=e222]: .kilo/agents/*.md
                      - text: ) replacing the modes system
                    - listitem [ref=e223]:
                      - strong [ref=e224]:
                        - link "Agent Manager" [ref=e225] [cursor=pointer]:
                          - /url: /docs/automate/agent-manager
                      - text: — Enhanced with diff panel, multi-model comparison, PR import, and code review annotations
                    - listitem [ref=e226]:
                      - strong [ref=e227]:
                        - link "Autocomplete" [ref=e228] [cursor=pointer]:
                          - /url: /docs/code-with-ai/features/autocomplete
                      - text: — FIM-based with Codestral, status bar cost tracking
                    - listitem [ref=e229]:
                      - strong [ref=e230]:
                        - link "Workflows" [ref=e231] [cursor=pointer]:
                          - /url: /docs/customize/workflows
                      - text: — Repeatable prompt templates as
                      - code [ref=e232]: .md
                      - text: files
                    - listitem [ref=e233]:
                      - strong [ref=e234]:
                        - link "Skills" [ref=e235] [cursor=pointer]:
                          - /url: /docs/customize/skills
                      - text: — Load specialized domain knowledge from SKILL.md files
                    - listitem [ref=e236]:
                      - strong [ref=e237]:
                        - link "Custom Subagents" [ref=e238] [cursor=pointer]:
                          - /url: /docs/customize/custom-subagents
                      - text: — Define specialized sub-agents for the
                      - code [ref=e239]: task
                      - text: tool
                    - listitem [ref=e240]:
                      - strong [ref=e241]: Open in Tab
                      - text: — Pop the chat out into a full editor tab
                    - listitem [ref=e242]:
                      - strong [ref=e243]: "Transcript export:"
                      - text: Save complete local session transcripts as Markdown files
                    - listitem [ref=e244]:
                      - strong [ref=e245]: Sub-Agent Viewer
                      - text: — Read-only panels for viewing child agent sessions
                    - listitem [ref=e246]:
                      - strong [ref=e247]: Legacy Migration
                      - text: — Automatic migration wizard for VSCode extension settings
                  - heading "Shared Settings" [level=2] [ref=e248]
                  - paragraph [ref=e249]:
                    - text: Settings apply across extension surfaces, including the sidebar and Agent Manager. The standalone CLI uses the same
                    - code [ref=e250]: ~/.config/kilo/kilo.jsonc
                    - text: (global) and
                    - code [ref=e251]: ./kilo.jsonc
                    - text: (project) files when used directly.
                  - heading "Proxy and Certificate Troubleshooting" [level=2] [ref=e252]
                  - paragraph [ref=e253]: Kilo Code for VS Code starts its embedded runtime from the extension and applies the relevant VS Code network settings to that runtime. On managed networks, configure proxy and certificate trust in VS Code settings rather than in a separate CLI install.
                  - paragraph [ref=e254]: "Use these settings when your organization requires a proxy or inspects HTTPS traffic:"
                  - list [ref=e255]:
                    - listitem [ref=e256]:
                      - text: Set
                      - code [ref=e257]: http.proxy
                      - text: to your organization proxy URL.
                    - listitem [ref=e258]:
                      - text: Use
                      - code [ref=e259]: http.noProxy
                      - text: for hosts that should bypass the proxy.
                    - listitem [ref=e260]:
                      - text: Leave
                      - code [ref=e261]: http.proxySupport
                      - text: enabled unless you intentionally want VS Code and Kilo Code to ignore proxy settings.
                    - listitem [ref=e262]: Install your organization's root certificate authority in the operating system trust store when HTTPS inspection is in use.
                    - listitem [ref=e263]:
                      - text: If the operating system trust store is not enough, set
                      - code [ref=e264]: kilo-code.new.extraCaCerts
                      - text: to the absolute path of a PEM file that contains the additional certificate authority certificates.
                    - listitem [ref=e265]:
                      - text: Keep
                      - code [ref=e266]: http.proxyStrictSSL
                      - text: enabled whenever possible. Disable it only as a temporary troubleshooting step or when your administrator explicitly requires it, because it disables TLS certificate verification for this path.
                  - paragraph [ref=e267]: "Example user or workspace settings:"
                  - generic [ref=e268]:
                    - button "Copy code to clipboard" [ref=e269] [cursor=pointer]:
                      - generic [ref=e270]: 
                    - generic [ref=e271]: "{ \"http.proxy\": \"http://proxy.example.com:8080\", \"http.noProxy\": [\"localhost\", \"127.0.0.1\", \".example.internal\"], \"kilo-code.new.extraCaCerts\": \"/absolute/path/to/corporate-ca.pem\" }"
