              - heading "Using the run button" [level=3] [ref=e591]
              - list [ref=e592]:
                - listitem [ref=e593]:
                  - strong [ref=e594]: "Run:"
                  - text: Click the play button in the toolbar or press
                  - code [ref=e595]: Cmd+E
                  - text: (macOS) /
                  - code [ref=e596]: Ctrl+E
                  - text: (Windows/Linux). Output appears in a dedicated VS Code task panel.
                - listitem [ref=e597]:
                  - strong [ref=e598]: "Stop:"
                  - text: Click the stop button (same position) or press
                  - code [ref=e599]: Cmd+E
                  - text: again while running.
                - listitem [ref=e600]:
                  - strong [ref=e601]: "Configure:"
                  - text: Click the dropdown arrow next to the run button and select "Configure run script" to open the script in your editor.
              - heading "Session State and Persistence" [level=2] [ref=e602]
              - paragraph [ref=e603]:
                - text: Agent Manager state is persisted in
                - code [ref=e604]: .kilo/agent-manager.json
                - text: . It stores worktrees, sections, session tabs, ordering, collapsed state, diff preferences, and cached PR metadata. Git branches and worktree directories remain on disk separately.
              - paragraph [ref=e605]:
                - text: Closing a managed worktree removes it from Agent Manager, deletes its
                - code [ref=e606]: .kilo/worktrees/
                - text: directory, and deletes the local branch. Closing an imported external worktree removes the Agent Manager entry but leaves the external directory and branch untouched.
