              - heading "Troubleshooting" [level=2] [ref=e706]
              - list [ref=e707]:
                - listitem [ref=e708]:
                  - strong [ref=e709]: "\"Please open a folder…\" error"
                  - text: — the Agent Manager requires a VS Code workspace folder
                - listitem [ref=e710]:
                  - strong [ref=e711]: Worktree creation fails
                  - text: — ensure Git is installed and the workspace is a valid git repository. Open the main repository (where
                  - code [ref=e712]: .git
                  - text: is a directory), not an existing worktree checkout.
                - listitem [ref=e713]:
                  - strong [ref=e714]: Provider or authentication errors
                  - text: — open extension Settings and verify your sign-in, provider, model, or BYOK configuration. Agent Manager uses the same settings as the sidebar.
                - listitem [ref=e715]:
                  - strong [ref=e716]: Session history missing cloud sessions
                  - text: — sign in through the extension and confirm the repository remote matches the sessions you expect to see.
                - listitem [ref=e717]:
                  - strong [ref=e718]: PR badges or PR import missing
                  - text: — install and authenticate the GitHub CLI (
                  - code [ref=e719]: gh
                  - text: ). This is only required for GitHub PR features.
