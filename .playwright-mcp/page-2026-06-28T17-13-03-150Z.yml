              - text: Built With Early Adopter Feedback
              - button "Link" [ref=e266] [cursor=pointer]:
                - img [ref=e267]
            - paragraph [ref=e270]:
              - text: Before shipping this as the default experience,
              - link "we released an early pre-release version" [ref=e271] [cursor=pointer]:
                - /url: https://blog.kilo.ai/p/we-completely-rebuilt-the-kilo-vs-code-extension
              - text: to developers willing to test the new architecture in real workflows. The response was substantial — we collected bug reports, friction points, and feature requests, and used that feedback to harden the extension into a production-ready release. If you were one of those early testers, thank you. This GA release is better because of you.
            - heading "Also in This Release Link" [level=2] [ref=e272]:
              - text: Also in This Release
              - button "Link" [ref=e275] [cursor=pointer]:
                - img [ref=e276]
            - paragraph [ref=e279]: "On top of the rebuilt architecture and the features above, this GA release includes several additions that came directly out of the pre-release feedback:"
            - list [ref=e280]:
              - listitem [ref=e281]:
                - paragraph [ref=e282]: Provider settings are now configurable directly inside the extension — no CLI setup required
              - listitem [ref=e283]:
