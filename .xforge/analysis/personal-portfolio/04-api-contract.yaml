openapi: 3.1.0
info:
  title: Personal Portfolio API
  version: 1.0.0
  description: |
    Nao ha API backend. Este contrato documenta apenas as APIs externas
    que a landing page consome (apenas 1: opcional Formspree para form).

paths:
  /contact-form-submission:
    post:
      summary: Submit contact form (opcional, via Formspree)
      description: |
        Se usar Formspree, o form faz POST para o endpoint do Formspree.
        Caso contrario, o form usa mailto: e nao tem API real.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactRequest"
            example:
              name: "Maria Santos"
              email: "maria@empresa.com"
              message: "Vi seu portfolio e gostaria de conversar sobre uma oportunidade."
      responses:
        "200":
          description: Mensagem enviada com sucesso
        "400":
          description: Dados invalidos
        "429":
          description: Rate limit excedido

components:
  schemas:
    ContactRequest:
      type: object
      required:
        - name
        - email
        - message
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        email:
          type: string
          format: email
        message:
          type: string
          minLength: 10
          maxLength: 2000
