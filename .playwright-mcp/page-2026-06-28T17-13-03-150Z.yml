            - heading "Parallel Execution and Subagent Delegation Link" [level=3] [ref=e137]:
              - text: Parallel Execution and Subagent Delegation
              - button "Link" [ref=e140] [cursor=pointer]:
                - img [ref=e141]
            - paragraph [ref=e144]: The most immediately noticeable change is speed — and the reason is parallelism at every level.
            - figure [ref=e146]:
              - link [ref=e147]:
                - /url: https://substackcdn.com/image/fetch/$s_!Kiv4!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F739de7a5-7137-4cce-9c2d-b3254f9830f2_972x855.png
                - generic [ref=e151]:
                  - button [ref=e152] [cursor=pointer]:
                    - img [ref=e153]
                  - button [ref=e155] [cursor=pointer]:
                    - img [ref=e156]
            - paragraph [ref=e157]: "Previously, many tasks were bottlenecked by sequential execution: read a file, wait; search the codebase, wait."
            - paragraph [ref=e158]:
              - text: Kilo
              - strong [ref=e159]: now supports parallel tool calls
              - text: ", meaning the agent can execute multiple actions simultaneously. Files are read, terminal commands run, and searches execute concurrently — you feel the difference right away."
            - paragraph [ref=e160]:
              - text: Beyond that, Kilo supports
              - strong [ref=e161]: parallel subagents
              - text: . When a task is too complex for a single prompt, Kilo can spin up multiple subagents that work simultaneously — an implementation agent, a test-writing agent, and a documentation agent — each handling its piece of the work in parallel, then merging results back to the parent agent. You can also define your own custom subagents to match how your team actually works.
            - paragraph [ref=e162]: The result is an agent that doesn’t just think faster — it works faster, doing more in the same amount of time.
            - heading "The Agent Manager Link" [level=3] [ref=e163]:
              - text: The Agent Manager
              - button "Link" [ref=e166] [cursor=pointer]:
                - img [ref=e167]
            - paragraph [ref=e170]:
              - text: The
              - strong [ref=e171]: Agent Manager is your control panel for parallel work
              - text: . Open multiple Kilo tabs and give each one a role. Monitor what each agent is doing, switch context instantly, and step in when you need to — whether you’re running two agents or eight.
            - figure [ref=e173]:
              - link [ref=e174]:
                - /url: https://substackcdn.com/image/fetch/$s_!D2EQ!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fc2b35077-0e8f-4fca-bdfb-9884a495efd6_1600x1002.png
                - generic [ref=e178]:
                  - button [ref=e179] [cursor=pointer]:
                    - img [ref=e180]
                  - button [ref=e182] [cursor=pointer]:
                    - img [ref=e183]
            - paragraph [ref=e184]:
              - text: Each tab is a fully independent agent. For workflows where tasks need isolation, the Agent Manager lets you
              - strong [ref=e185]: create git worktrees
              - text: ": separate copies of your repository where each agent operates independently. One agent adds a new API endpoint, another refactors the auth module, a third writes tests — all simultaneously, without stepping on each other’s code. When they’re done, you merge the results, apply changes directly, commit them, or open a PR."
            - figure [ref=e187]:
              - link [ref=e188]:
                - /url: https://substackcdn.com/image/fetch/$s_!WaIK!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F4dd9ed5c-4ff9-44e4-8282-f7a19c4006bb_1036x816.png
                - generic [ref=e192]:
                  - button [ref=e193] [cursor=pointer]:
                    - img [ref=e194]
                  - button [ref=e196] [cursor=pointer]:
                    - img [ref=e197]
            - paragraph [ref=e198]: "For read-heavy workflows, running parallel agents on the same worktree is also supported. A common pattern: one agent makes changes while a second reviews the current diff or investigates how a feature is implemented elsewhere in the codebase. A much faster feedback loop."
            - heading "Inline Code Review Link" [level=3] [ref=e199]:
              - text: Inline Code Review
              - button "Link" [ref=e202] [cursor=pointer]:
                - img [ref=e203]
            - paragraph [ref=e206]: When agents make changes across your codebase, you need a precise way to review the work and push back when something isn't right. The Agent Manager includes a built-in diff reviewer that shows every change an agent has made, file by file, in either unified or split view.
            - figure [ref=e208]:
              - link [ref=e209]:
                - /url: https://substackcdn.com/image/fetch/$s_!2cfK!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F70ac3ab6-5db0-49ff-b692-2c8634a7c6ac_1600x470.png
                - generic [ref=e213]:
                  - button [ref=e214] [cursor=pointer]:
                    - img [ref=e215]
                  - button [ref=e217] [cursor=pointer]:
                    - img [ref=e218]
            - paragraph [ref=e219]:
              - text: More importantly,
              - strong [ref=e220]: you can leave line-level review comments directly on the diff
              - text: "— the same way you would on a pull request. Click a line, type your feedback, and hit “Send all to chat.” Every comment, with its file path, line number, and the relevant code, is sent to Kilo as structured context. This turns agent-assisted development into something closer to a real code review workflow: targeted conversation about specific lines of code, not approval or rejection of an entire changeset."
            - heading "Multi-Model Comparisons Link" [level=3] [ref=e221]:
              - text: Multi-Model Comparisons
              - button "Link" [ref=e224] [cursor=pointer]:
                - img [ref=e225]
            - paragraph [ref=e228]:
              - text: The Agent Manager lets you
              - strong [ref=e229]: start multiple agents on the same prompt
              - text: "using different models — Claude Opus 4.6 and GPT-5.4, for example — and compare results side by side. It's useful any time you're working on something complex or open-ended: a tricky refactor, a page layout, an architecture decision. Run two or three models on the same problem and go with the one that got closest."
            - figure [ref=e231]:
              - link [ref=e232]:
                - /url: https://substackcdn.com/image/fetch/$s_!PTk1!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fb94c9194-1f9c-4306-9a0b-e0ffca1917ab_1266x986.png
                - generic [ref=e236]:
                  - button [ref=e237] [cursor=pointer]:
                    - img [ref=e238]
