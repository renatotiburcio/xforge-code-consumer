                  - paragraph [ref=e191]:
                    - text: The VS Code extension provides a
                    - strong [ref=e192]: Settings webview UI
                    - text: accessible from Kilo Code by clicking the gear icon (
                    - generic [ref=e193]: 
                    - text: ). The UI is organized into tabs including Providers, Auto-Approve, Models, and more.
                  - paragraph [ref=e194]: This UI reads and writes to the same underlying JSONC config files used across extension surfaces. Changes apply to the sidebar, Agent Manager, and the CLI when used directly.
                  - heading "Config File Locations" [level=3] [ref=e195]
                  - paragraph [ref=e196]: "There are two primary config files:"
                  - list [ref=e197]:
                    - listitem [ref=e198]:
                      - strong [ref=e199]: "Global config:"
                      - code [ref=e200]: ~/.config/kilo/kilo.jsonc
                      - text: — applies to all projects. On Windows, this is
                      - code [ref=e201]: C:\Users\<username>\.config\kilo\kilo.jsonc
                      - text: .
                    - listitem [ref=e202]:
                      - strong [ref=e203]: "Project config:"
                      - code [ref=e204]: kilo.jsonc
                      - text: in your project root, or
                      - code [ref=e205]: .kilo/kilo.jsonc
                      - text: for a cleaner setup. The
                      - code [ref=e206]: .kilo/
                      - text: version takes priority if both exist.
                  - paragraph [ref=e207]:
                    - text: Use
                    - strong [ref=e208]: Local Config
                    - text: or
                    - strong [ref=e209]: Global Config
                    - text: in the Settings header to open the matching config file from VS Code. If multiple config files are available, choose the exact file from the picker. If the recommended file does not exist yet, Kilo creates it before opening it.
                  - generic [ref=e210]:
                    - generic [ref=e211]:
                      - generic [ref=e212]: ⚠️
                      - generic [ref=e213]: Warning
                    - paragraph [ref=e215]:
                      - text: If you check config files into version control, make sure they do not contain API keys or other secrets (e.g.,
                      - code [ref=e216]: provider.*.options.apiKey
                      - text: ). Use environment variables for credentials instead.
