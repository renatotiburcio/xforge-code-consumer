      - main [ref=e153]:
        - generic [ref=e154]:
          - generic [ref=e155]:
            - article [ref=e156]:
              - heading "Agent Manager" [level=1] [ref=e157]
              - paragraph [ref=e158]: The Agent Manager is a control panel for running and orchestrating multiple Kilo Code agents, with support for parallel worktree-isolated sessions.
              - paragraph [ref=e159]:
                - text: The Agent Manager is a
                - strong [ref=e160]: full-panel editor tab
                - text: "built directly into the extension. It uses the extension's embedded runtime, so no separate Kilo CLI installation or CLI authentication setup is required. It supports:"
              - list [ref=e161]:
                - listitem [ref=e162]: Multiple parallel sessions, each in its own git worktree
                - listitem [ref=e163]: A diff/review panel showing changes vs. the parent branch
                - listitem [ref=e164]: Dedicated VS Code integrated terminals per session
                - listitem [ref=e165]:
                  - text: Setup scripts and
                  - code [ref=e166]: .env
                  - text: auto-copy on worktree creation
                - listitem [ref=e167]: Session import from existing branches, external worktrees, or GitHub PR URLs
                - listitem [ref=e168]: "\"Continue in Worktree\" to promote a sidebar session to the Agent Manager"
                - listitem [ref=e169]: The same providers, BYOK keys, custom providers, and extension features supported in the sidebar
              - generic [ref=e170]:
                - generic [ref=e171]:
                  - generic [ref=e172]: 💡
                  - generic [ref=e173]: Tip
                - paragraph [ref=e175]:
                  - text: New to running multiple agents in parallel? The
                  - link "Agent Manager Workflows" [ref=e176] [cursor=pointer]:
                    - /url: /docs/automate/agent-manager-workflows
                  - text: guide walks through when to use the sidebar vs. the Agent Manager, how to pick tasks that parallelize well, and the common patterns for testing, reviewing, and integrating changes across worktrees.
              - heading "Opening the Agent Manager" [level=2] [ref=e177]
              - list [ref=e178]:
                - listitem [ref=e179]:
                  - text: "Keyboard shortcut:"
                  - code [ref=e180]: Cmd+Shift+M
                  - text: (macOS) /
                  - code [ref=e181]: Ctrl+Shift+M
                  - text: (Windows/Linux)
                - listitem [ref=e182]: "Command Palette: \"Kilo Code: Open Agent Manager\""
                - listitem [ref=e183]: Click the Agent Manager icon in the sidebar toolbar
              - paragraph [ref=e184]: The panel opens as an editor tab and stays active across focus changes.
              - heading "Requirements" [level=2] [ref=e185]
              - list [ref=e186]:
                - listitem [ref=e187]: Open a VS Code workspace folder
                - listitem [ref=e188]: Use a git repository for worktree features
                - listitem [ref=e189]: Open the main repository, not an existing worktree checkout, when creating new worktrees
              - heading "Providers and Authentication" [level=2] [ref=e190]
              - paragraph [ref=e191]: Agent Manager uses the same sign-in, provider settings, models, BYOK keys, custom providers, MCP servers, and permission rules as the extension sidebar. Configure them from extension Settings and they apply to Agent Manager as well.
              - paragraph [ref=e192]:
                - text: See
                - link "Setup & Authentication" [ref=e193] [cursor=pointer]:
                  - /url: /docs/getting-started/setup-authentication
                - text: ","
                - link "AI Providers" [ref=e194] [cursor=pointer]:
                  - /url: /docs/ai-providers
                - text: ", and"
                - link "Bring Your Own Key" [ref=e195] [cursor=pointer]:
                  - /url: /docs/getting-started/byok
                - text: for setup details.
              - heading "Working with Worktrees" [level=2] [ref=e196]
              - paragraph [ref=e197]: Each Agent Manager session runs in an isolated git worktree on a separate branch, keeping your main branch clean.
              - heading "Worktree Location" [level=3] [ref=e198]
              - paragraph [ref=e199]:
                - text: Managed worktrees are created under
                - code [ref=e200]: .kilo/worktrees/
                - text: in your project. Kilo also stores Agent Manager UI state in
                - code [ref=e201]: .kilo/agent-manager.json
                - text: .
              - generic [ref=e202]:
                - generic [ref=e203]:
                  - generic [ref=e204]: ℹ️
                  - generic [ref=e205]: Info
                - paragraph [ref=e207]:
                  - text: Worktrees share Git object storage with the main repository, but each worktree is still a separate checkout on disk. Files created inside each worktree, such as
                  - code [ref=e208]: node_modules
                  - text: ", build output, local databases, generated files, and package-manager caches, can multiply disk usage across parallel agents. Closing a managed worktree removes its checkout directory, but it does not remove external caches, containers, volumes, simulators, or databases that your scripts created outside the worktree."
              - heading "PR Status Badges" [level=3] [ref=e209]
              - paragraph [ref=e210]:
                - text: Each worktree item displays a
                - strong [ref=e211]: PR status badge
                - text: when its branch has an associated pull request. The badge shows the PR number (e.g.
                - code [ref=e212]: "#142"
                - text: ) and is color-coded to reflect the current state at a glance. Click the badge to open the PR in your browser.
              - generic [ref=e213]:
                - generic [ref=e214]:
                  - generic [ref=e215]: ℹ️
                  - generic [ref=e216]: Info
                - paragraph [ref=e218]:
                  - text: The GitHub CLI (
                  - code [ref=e219]: gh
                  - text: ) must be installed and authenticated for PR badges to work. If
                  - code [ref=e220]: gh
                  - text: is missing or not logged in, badges won't appear.
              - heading "How PRs are detected" [level=4] [ref=e221]
              - paragraph [ref=e222]:
                - text: The extension uses
                - code [ref=e223]: gh
                - text: "to automatically discover PRs for each worktree branch. Three strategies are tried in order:"
              - list [ref=e224]:
                - listitem [ref=e225]:
                  - strong [ref=e226]: Branch tracking ref
                  - text: —
                  - code [ref=e227]: gh pr view
                  - text: resolves via the branch's tracking ref (works for fork PRs checked out with
                  - code [ref=e228]: gh pr checkout
                  - text: )
                - listitem [ref=e229]:
                  - strong [ref=e230]: Branch name
                  - text: —
                  - code [ref=e231]: gh pr view <branch>
                  - text: matches same-repo branches pushed to origin
                - listitem [ref=e232]:
                  - strong [ref=e233]: HEAD commit SHA
                  - text: —
                  - code [ref=e234]: gh pr list --search "<sha>"
                  - text: as a last resort, matching PRs whose head ref points to the exact same commit
              - paragraph [ref=e235]:
                - text: "You can also import a PR directly from the advanced new worktree dialog: open the"
                - strong [ref=e236]: New Worktree
                - text: dropdown and select
                - strong [ref=e237]: Advanced
                - text: ", or press"
                - code [ref=e238]: Cmd+Shift+N
                - text: (macOS) /
                - code [ref=e239]: Ctrl+Shift+N
                - text: (Windows/Linux), switch to the
                - strong [ref=e240]: Import
                - text: tab, then paste the GitHub PR URL. The branch is checked out and the badge appears automatically.
              - heading "Badge colors" [level=4] [ref=e241]
              - paragraph [ref=e242]: "The badge color reflects the most important signal, evaluated in priority order:"
              - table [ref=e244]:
                - rowgroup [ref=e245]:
                  - row "State Color Condition" [ref=e246]:
                    - columnheader "State" [ref=e247]
                    - columnheader "Color" [ref=e248]
                    - columnheader "Condition" [ref=e249]
                - rowgroup [ref=e250]:
                  - row "Draft Gray PR is in draft state" [ref=e251]:
                    - cell "Draft" [ref=e252]
                    - cell "Gray" [ref=e253]
                    - cell "PR is in draft state" [ref=e254]
                  - row "Merged Purple PR has been merged" [ref=e255]:
                    - cell "Merged" [ref=e256]
                    - cell "Purple" [ref=e257]
                    - cell "PR has been merged" [ref=e258]
                  - row "Closed Red PR was closed without merging" [ref=e259]:
                    - cell "Closed" [ref=e260]
                    - cell "Red" [ref=e261]
                    - cell "PR was closed without merging" [ref=e262]
                  - row "Checks failing Red Any CI check has failed" [ref=e263]:
                    - cell "Checks failing" [ref=e264]
                    - cell "Red" [ref=e265]
                    - cell "Any CI check has failed" [ref=e266]
                  - row "Changes requested Yellow A reviewer requested changes" [ref=e267]:
                    - cell "Changes requested" [ref=e268]
                    - cell "Yellow" [ref=e269]
                    - cell "A reviewer requested changes" [ref=e270]
                  - row "Checks pending Yellow (pulsing) CI checks are still running" [ref=e271]:
                    - cell "Checks pending" [ref=e272]
                    - cell "Yellow (pulsing)" [ref=e273]
                    - cell "CI checks are still running" [ref=e274]
                  - row "Open (default) Green PR is open, no failing or pending checks, no blocking review" [ref=e275]:
                    - cell "Open (default)" [ref=e276]
                    - cell "Green" [ref=e277]
                    - cell "PR is open, no failing or pending checks, no blocking review" [ref=e278]
              - paragraph [ref=e279]: When checks are pending on an open PR, the badge pulses to indicate activity.
              - heading "Badge icon" [level=4] [ref=e280]
              - paragraph [ref=e281]:
                - text: The badge shows a
                - strong [ref=e282]: checkmark
                - text: icon when the PR review status is "Approved", and a
                - strong [ref=e283]: branch
                - text: icon in all other cases.
              - heading "Hover card details" [level=4] [ref=e284]
              - paragraph [ref=e285]: "Hovering over a worktree item shows a card with additional PR details:"
              - list [ref=e286]:
                - listitem [ref=e287]:
                  - strong [ref=e288]: PR number
                  - text: with a link icon to open it in the browser
                - listitem [ref=e289]:
                  - strong [ref=e290]: State
                  - text: — Open, Draft, Merged, or Closed
                - listitem [ref=e291]:
                  - strong [ref=e292]: Review
                  - text: — Approved, Changes Requested, or Pending (when a review exists)
                - listitem [ref=e293]:
                  - strong [ref=e294]: Checks
                  - text: — how many checks passed out of the total (e.g.
                  - code [ref=e295]: 8/10 passed
                  - text: )
              - heading "Automatic updates" [level=4] [ref=e296]
              - paragraph [ref=e297]: PR badges update automatically in the background. The active worktree refreshes frequently, while other worktrees sync periodically to keep badges current. Polling pauses when the Agent Manager panel is hidden.
              - heading "Creating a New Worktree Session" [level=3] [ref=e298]
              - list [ref=e299]:
                - listitem [ref=e300]:
                  - text: Click
                  - strong [ref=e301]: New Worktree
                  - text: or press
                  - code [ref=e302]: Cmd+N
                  - text: (macOS) /
                  - code [ref=e303]: Ctrl+N
                  - text: (Windows/Linux) to create a new worktree
                - listitem [ref=e304]: Enter a branch name (or let Kilo generate one)
                - listitem [ref=e305]: Type your first message to start the agent
              - paragraph [ref=e306]: A new git worktree is created from your current branch. The agent works in isolation — your main branch is unaffected.
              - heading "Multi-Version Mode" [level=3] [ref=e307]
              - paragraph [ref=e308]: "You can run up to 4 parallel implementations of the same prompt across separate worktrees:"
              - list [ref=e309]:
                - listitem [ref=e310]: Click the multi-version button and enter a prompt
                - listitem [ref=e311]: Optionally assign different models to each version
                - listitem [ref=e312]: Kilo creates one worktree + session per version and runs them in parallel
              - heading "Importing Existing Work" [level=3] [ref=e313]
              - list [ref=e314]:
                - listitem [ref=e315]:
                  - strong [ref=e316]: "From a branch:"
                  - text: Import an existing git branch as a worktree
                - listitem [ref=e317]:
                  - strong [ref=e318]: "From a GitHub PR URL:"
                  - text: Paste a PR URL to import it as a worktree
                - listitem [ref=e319]:
                  - strong [ref=e320]: "From an external worktree:"
                  - text: Import a worktree that already exists on disk
                - listitem [ref=e321]:
                  - strong [ref=e322]: "Continue in Worktree:"
                  - text: From the sidebar chat, promote the current session to a new Agent Manager worktree
              - paragraph [ref=e323]: Imported work stays associated with its branch or worktree and can be continued from Agent Manager.
              - heading "Sessions and History" [level=3] [ref=e324]
              - list [ref=e325]:
                - listitem [ref=e326]: Create a worktree session to start a new agent in an isolated branch
                - listitem [ref=e327]:
                  - text: Press
                  - code [ref=e328]: Cmd+T
                  - text: (macOS) /
                  - code [ref=e329]: Ctrl+T
                  - text: (Windows/Linux) to start another session in the selected worktree
                - listitem [ref=e330]: Use session history to reopen local sessions or preview cloud sessions
                - listitem [ref=e331]: Continue a cloud session locally from Agent Manager using the same extension sign-in and provider settings
              - heading "Renaming Worktrees" [level=3] [ref=e332]
              - paragraph [ref=e333]:
                - text: Double-click a worktree name to edit its label inline. You can also right-click the worktree and choose
                - strong [ref=e334]: Rename
                - text: . Press
                - code [ref=e335]: Enter
                - text: or click outside the field to save, or press
                - code [ref=e336]: Escape
                - text: to cancel.
              - paragraph [ref=e337]: Renaming a worktree changes only the label shown in Agent Manager. It does not rename the underlying git branch.
              - heading "Starting Sessions From Chat" [level=2] [ref=e338]
              - paragraph [ref=e339]:
                - text: Kilo can start Agent Manager sessions from chat with the
                - code [ref=e340]: agent_manager
                - text: tool. It is available by default only in the VS Code extension because Agent Manager is an extension feature.
              - paragraph [ref=e341]: "The tool supports two modes:"
              - table [ref=e343]:
                - rowgroup [ref=e344]:
                  - row "Mode Behavior" [ref=e345]:
                    - columnheader "Mode" [ref=e346]
                    - columnheader "Behavior" [ref=e347]
                - rowgroup [ref=e348]:
                  - row "worktree Creates one Agent Manager git worktree and session per task" [ref=e349]:
                    - cell "worktree" [ref=e350]:
                      - code [ref=e351]: worktree
                    - cell "Creates one Agent Manager git worktree and session per task" [ref=e352]
                  - row "local Creates Agent Manager sessions in the current workspace without git worktree isolation" [ref=e353]:
                    - cell "local" [ref=e354]:
                      - code [ref=e355]: local
                    - cell "Creates Agent Manager sessions in the current workspace without git worktree isolation" [ref=e356]
              - paragraph [ref=e357]:
                - text: Each request can include 1-20 tasks. Each task must include at least one of
                - code [ref=e358]: prompt
                - text: ","
                - code [ref=e359]: name
                - text: ", or"
                - code [ref=e360]: branchName
                - text: . Use
                - code [ref=e361]: "versions: true"
                - text: only when the tasks are alternate versions of the same work to compare; otherwise, multiple tasks start as independent sessions.
              - paragraph [ref=e362]:
                - text: The tool uses the
                - code [ref=e363]: agent_manager
                - text: permission. Approval prompts are scoped to the requested mode, so approving
                - code [ref=e364]: worktree
                - text: does not automatically approve
                - code [ref=e365]: local
                - text: .
              - heading "Sections" [level=2] [ref=e366]
              - paragraph [ref=e367]: Sections let you group worktrees into collapsible, color-coded folders in the sidebar. Use them to organize your workflow however you like — by status ("Review Pending", "In Progress"), by project area ("Frontend", "Backend"), priority, or any other scheme that fits.
              - heading "Creating a Section" [level=3] [ref=e368]
              - list [ref=e369]:
                - listitem [ref=e370]:
                  - strong [ref=e371]: Right-click
                  - text: any worktree and select
                  - strong [ref=e372]: New Section
                  - text: from the context menu
                - listitem [ref=e373]:
                  - text: A new section is created with a random color and enters rename mode immediately — type a name and press
                  - code [ref=e374]: Enter
              - heading "Assigning Worktrees to Sections" [level=3] [ref=e375]
              - paragraph [ref=e376]:
                - strong [ref=e377]: "Via context menu:"
                - text: Right-click a worktree, hover
                - strong [ref=e378]: Move to Section
                - text: ", and pick a section from the list. Select"
                - strong [ref=e379]: Ungrouped
                - text: to remove it from its current section.
              - paragraph [ref=e380]:
                - strong [ref=e381]: "Via drag and drop:"
                - text: Drag a worktree and drop it onto a section header to move it there.
              - paragraph [ref=e382]: Multi-version worktrees (created via Multi-Version Mode) are moved together — assigning one version to a section moves all versions in the group.
              - heading "Renaming Sections" [level=3] [ref=e383]
              - paragraph [ref=e384]:
                - text: Right-click the section header and select
                - strong [ref=e385]: Rename Section
                - text: . An inline text field appears — type the new name and press
                - code [ref=e386]: Enter
                - text: to confirm or
                - code [ref=e387]: Escape
                - text: to cancel.
              - heading "Colors" [level=3] [ref=e388]
              - paragraph [ref=e389]:
                - text: Right-click the section header and select
                - strong [ref=e390]: Set Color
                - text: to open the color picker. Eight colors are available (Red, Orange, Yellow, Green, Cyan, Blue, Purple, Magenta) plus a
                - strong [ref=e391]: Default
                - text: option that uses the standard panel border color. The selected color appears as a left border stripe on the section.
              - heading "Reordering" [level=3] [ref=e392]
              - paragraph [ref=e393]:
                - text: Right-click the section header and use
                - strong [ref=e394]: Move Up
                - text: /
                - strong [ref=e395]: Move Down
                - text: to reposition it in the sidebar. Sections and ungrouped worktrees share the same ordering space.
              - heading "Collapsing" [level=3] [ref=e396]
              - paragraph [ref=e397]: Click the section header to toggle it open or closed. Collapsed sections hide their worktrees and show only the section name and a member count badge. Collapse state is persisted across reloads.
              - heading "Deleting a Section" [level=3] [ref=e398]
              - paragraph [ref=e399]:
                - text: Right-click the section header and select
                - strong [ref=e400]: Delete Section
                - text: . The section is removed but its worktrees are preserved — they become ungrouped.
              - heading "Sending Messages, Approvals, and Control" [level=2] [ref=e401]
              - list [ref=e402]:
                - listitem [ref=e403]:
                  - strong [ref=e404]: "Continue the conversation:"
                  - text: Send a follow-up message to the running agent
                - listitem [ref=e405]:
                  - strong [ref=e406]: "Approvals:"
                  - text: The Permission Dock shows tool approval prompts — approve once, approve always, or deny
                - listitem [ref=e407]:
                  - strong [ref=e408]: "Cancel:"
                  - text: Sends a cooperative stop signal to the agent
                - listitem [ref=e409]:
                  - strong [ref=e410]: "Stop:"
                  - text: Force-terminates the session and marks it as stopped
              - heading "Diff / Review Panel" [level=2] [ref=e411]
              - paragraph [ref=e412]:
                - text: Press
                - code [ref=e413]: Cmd+D
                - text: (macOS) /
                - code [ref=e414]: Ctrl+D
                - text: (Windows/Linux) to toggle the diff panel. It shows a live-updating diff between the worktree and its parent branch.
              - list [ref=e415]:
                - listitem [ref=e416]:
                  - text: Select files and click
                  - strong [ref=e417]: Apply to local
                  - text: to copy the worktree's changes onto your local checkout of the base branch
                - listitem [ref=e418]: Conflicts are surfaced with a resolution dialog
                - listitem [ref=e419]: Supports unified and split diff views
                - listitem [ref=e420]: Markdown files include an eye/code toggle in the file header to switch between rendered Markdown and the raw diff
                - listitem [ref=e421]:
                  - strong [ref=e422]: Drag file headers into chat
                  - text: — drag a file header from the diff panel into the chat input to insert an
                  - code [ref=e423]: "@file"
                  - text: mention, giving the agent context about specific changed files
              - paragraph [ref=e424]:
                - text: See
                - link "Agent Manager Workflows" [ref=e425] [cursor=pointer]:
                  - /url: /docs/automate/agent-manager-workflows#merging-worktree-and-parent-branch
                - text: for the full integration story, including when to apply locally vs. merge directly vs. open a pull request.
              - heading "Terminals" [level=2] [ref=e426]
              - paragraph [ref=e427]:
                - text: Each session has a dedicated integrated terminal rooted in the session's worktree directory. Press
                - code [ref=e428]: Cmd+/
                - text: (macOS) /
                - code [ref=e429]: Ctrl+/
                - text: (Windows/Linux) to focus the terminal for the active session.
              - heading "Switching Between Terminal and Agent Manager" [level=3] [ref=e430]
              - paragraph [ref=e431]: "A common workflow is letting the agent work, then switching to the terminal to run tests or inspect the worktree, then switching back to control the agent:"
              - list [ref=e432]:
                - listitem [ref=e433]:
                  - strong [ref=e434]: "Agent Manager → Terminal:"
                  - text: Press
                  - code [ref=e435]: Cmd+/
                  - text: (macOS) /
                  - code [ref=e436]: Ctrl+/
                  - text: (Windows/Linux) to open and focus the terminal for the current session. The terminal runs inside the session's worktree, so commands like
                  - code [ref=e437]: npm test
                  - text: or
                  - code [ref=e438]: git status
                  - text: operate on the agent's isolated branch.
                - listitem [ref=e439]:
                  - strong [ref=e440]: "Terminal → Agent Manager:"
                  - text: Press
                  - code [ref=e441]: Cmd+Shift+M
                  - text: (macOS) /
                  - code [ref=e442]: Ctrl+Shift+M
                  - text: (Windows/Linux) to bring focus back to the Agent Manager panel and its prompt input. This works from anywhere in VS Code — the terminal, another editor tab, or the sidebar.
              - heading "Setup Scripts" [level=2] [ref=e443]
              - paragraph [ref=e444]: Setup scripts let you prepare each new worktree before the agent starts, for example by installing dependencies, linking local config, copying non-standard env files, or creating per-worktree databases.
              - paragraph [ref=e445]:
                - text: Create a script file in
                - code [ref=e446]: .kilo/
                - text: "using the appropriate filename for your platform:"
              - table [ref=e448]:
                - rowgroup [ref=e449]:
                  - row "Platform Filename (checked in order)" [ref=e450]:
                    - columnheader "Platform" [ref=e451]
                    - columnheader "Filename (checked in order)" [ref=e452]
                - rowgroup [ref=e453]:
                  - row "macOS / Linux .kilo/setup-script, .kilo/setup-script.sh" [ref=e454]:
                    - cell "macOS / Linux" [ref=e455]
                    - cell ".kilo/setup-script, .kilo/setup-script.sh" [ref=e456]:
                      - code [ref=e457]: .kilo/setup-script
                      - text: ","
                      - code [ref=e458]: .kilo/setup-script.sh
                  - row "Windows .kilo/setup-script.ps1, .kilo/setup-script.cmd, .kilo/setup-script.bat" [ref=e459]:
                    - cell "Windows" [ref=e460]
                    - cell ".kilo/setup-script.ps1, .kilo/setup-script.cmd, .kilo/setup-script.bat" [ref=e461]:
                      - code [ref=e462]: .kilo/setup-script.ps1
                      - text: ","
                      - code [ref=e463]: .kilo/setup-script.cmd
                      - text: ","
                      - code [ref=e464]: .kilo/setup-script.bat
              - paragraph [ref=e465]:
                - text: Kilo runs the script automatically whenever a new worktree is created. It uses
                - code [ref=e466]: sh
                - text: for POSIX scripts, PowerShell for
                - code [ref=e467]: .ps1
                - text: ", and"
                - code [ref=e468]: cmd.exe
                - text: for
                - code [ref=e469]: .cmd
                - text: /
                - code [ref=e470]: .bat
                - text: ", so executable permissions are not required."
              - paragraph [ref=e471]: "Two extra variables are injected into the setup script's environment:"
              - table [ref=e473]:
                - rowgroup [ref=e474]:
                  - row "Variable Value" [ref=e475]:
                    - columnheader "Variable" [ref=e476]
                    - columnheader "Value" [ref=e477]
                - rowgroup [ref=e478]:
                  - row "WORKTREE_PATH Absolute path to the new worktree directory" [ref=e479]:
                    - cell "WORKTREE_PATH" [ref=e480]:
                      - code [ref=e481]: WORKTREE_PATH
                    - cell "Absolute path to the new worktree directory" [ref=e482]
                  - row "REPO_PATH Repository root" [ref=e483]:
                    - cell "REPO_PATH" [ref=e484]:
                      - code [ref=e485]: REPO_PATH
                    - cell "Repository root" [ref=e486]
              - paragraph [ref=e487]: "For example, on macOS / Linux:"
              - generic [ref=e488]:
                - button "Copy code to clipboard" [ref=e489] [cursor=pointer]:
                  - generic [ref=e490]: 
                - generic [ref=e491]:
                  - text: "#!/bin/sh set -e cd"
                  - generic [ref=e492]: "\"$WORKTREE_PATH\""
                  - text: "npm install # Copy a nested env file that Kilo does not auto-copy. if [ -f"
                  - generic [ref=e493]: "\"$REPO_PATH/apps/web/.env.local\""
                  - text: "] && [ ! -f"
                  - generic [ref=e494]: "\"$WORKTREE_PATH/apps/web/.env.local\""
                  - text: "]; then cp"
                  - generic [ref=e495]: "\"$REPO_PATH/apps/web/.env.local\""
                  - generic [ref=e496]: "\"$WORKTREE_PATH/apps/web/.env.local\""
                  - text: fi
              - paragraph [ref=e497]: If the setup script fails, Agent Manager shows the failure and keeps the worktree available so you can inspect it, fix the script, or run setup steps manually.
              - heading "Environment File Copying" [level=3] [ref=e498]
              - paragraph [ref=e499]:
                - text: Before the setup script runs, Kilo automatically copies root-level
                - code [ref=e500]: .env
                - text: files from the main repo into the new worktree.
              - paragraph [ref=e501]: "Copied automatically:"
              - list [ref=e502]:
                - listitem [ref=e503]:
                  - text: Root-level plain files named exactly
                  - code [ref=e504]: .env
                - listitem [ref=e505]:
                  - text: Root-level plain files matching
                  - code [ref=e506]: .env.*
                  - text: ", such as"
                  - code [ref=e507]: .env.local
                  - text: or
                  - code [ref=e508]: .env.development
              - paragraph [ref=e509]: "Not copied automatically:"
              - list [ref=e510]:
                - listitem [ref=e511]:
                  - text: Nested env files, such as
                  - code [ref=e512]: apps/web/.env.local
                - listitem [ref=e513]:
                  - text: Non-dotenv files, such as
                  - code [ref=e514]: .envrc
                  - text: ","
                  - code [ref=e515]: .environment
                  - text: ", or"
                  - code [ref=e516]: .env-cmdrc
                - listitem [ref=e517]:
                  - text: Directories named
                  - code [ref=e518]: .env
                  - text: or
                  - code [ref=e519]: .env.local
                - listitem [ref=e520]: Files that already exist in the worktree, because Kilo never overwrites them
              - paragraph [ref=e521]:
                - text: Use
                - code [ref=e522]: .kilo/setup-script
                - text: for anything outside the automatic copy rules, including nested env files, ignored local config, local certificates, local database files, generated config directories, or tool-specific files required to run the project.
              - heading "Run Script" [level=2] [ref=e523]
              - paragraph [ref=e524]: The run button lets you start your project (dev server, build, tests, etc.) directly from the Agent Manager toolbar without switching to a terminal. It executes a shell script you define once, and runs it in the context of whichever worktree is currently selected.
              - heading "Setting up a run script" [level=3] [ref=e525]
              - paragraph [ref=e526]:
                - text: Create a script file in
                - code [ref=e527]: .kilo/
                - text: "using the appropriate filename for your platform:"
              - table [ref=e529]:
                - rowgroup [ref=e530]:
                  - row "Platform Filename (checked in order)" [ref=e531]:
                    - columnheader "Platform" [ref=e532]
                    - columnheader "Filename (checked in order)" [ref=e533]
                - rowgroup [ref=e534]:
                  - row "macOS / Linux .kilo/run-script, .kilo/run-script.sh" [ref=e535]:
