      - main [ref=e186]:
        - generic [ref=e188]:
          - article [ref=e189]:
            - heading "What's New in Kilo Code" [level=1] [ref=e190]
            - paragraph [ref=e191]: "The Kilo Code extension has been completely rebuilt on a portable, open-source core shared across VS Code, the CLI, and Cloud Agents. This is the biggest update since launch: faster execution with parallel tool calls and subagents, the new Agent Manager for running multiple agents side by side, inline code review with line-level comments, multi-model comparisons, and access to 500+ models."
            - paragraph [ref=e192]:
              - text: Whether you're writing features in VS Code, debugging over SSH, or reviewing code on Slack, Kilo now goes with you. Read the
              - link "full announcement on the Kilo Blog" [ref=e193] [cursor=pointer]:
                - /url: https://blog.kilo.ai/p/new-kilo-for-vs-code-is-live
              - text: for everything that's new.
            - separator [ref=e194]
            - heading "Adjusting to the new version" [level=2] [ref=e195]
            - paragraph [ref=e196]: A lot has changed under the hood, and some things have moved around. If you're coming from the previous extension, you might have questions about where to find certain features or how things work now. We've collected the most common questions below.
            - paragraph [ref=e197]: "Still stumped after reading this? Come find us in discord at #vscode."
            - heading "Where did code indexing go?" [level=3] [ref=e198]
            - paragraph [ref=e199]:
              - text: Code indexing is temporarily unavailable in the new extension. It is actively being worked on and is expected to return soon. Please follow
              - link "this issue" [ref=e200] [cursor=pointer]:
                - /url: https://github.com/Kilo-Org/kilocode/issues/6144
            - heading "How do checkpoints work in the new extension?" [level=3] [ref=e201]
            - paragraph [ref=e202]:
              - text: Checkpoints are now called
              - strong [ref=e203]: snapshots
              - text: in the new extension. They use Git-based snapshots of your working directory, taken before and after agent edits. You can revert any message's changes directly from the chat, and a revert banner appears when you're viewing an earlier state. See the
              - link "Checkpoints documentation" [ref=e204] [cursor=pointer]:
                - /url: /docs/code-with-ai/features/checkpoints
              - text: for details.
            - heading "Where is the auto-approve settings UI?" [level=3] [ref=e205]
            - paragraph [ref=e206]:
              - text: The old auto-confirm commands UI has been replaced by a granular per-tool permission system. Open
              - strong [ref=e207]: Settings → Auto Approve
              - text: to configure each tool (bash, read, edit, glob, grep, etc.) with
              - strong [ref=e208]: Allow
              - text: ","
              - strong [ref=e209]: Ask
              - text: ", or"
              - strong [ref=e210]: Deny
              - text: . There is no longer a separate command allowlist — shell execution is controlled by the
              - code [ref=e211]: bash
              - text: tool permission. See
              - link "Auto-Approving Actions" [ref=e212] [cursor=pointer]:
                - /url: /docs/getting-started/settings/auto-approving-actions
              - text: for more information.
            - heading "Is the context progress graph still available?" [level=3] [ref=e213]
            - paragraph [ref=e214]: "Yes — the context progress graph (also known as the task timeline) is now available. It appears at the top of the chat panel and shows:"
            - list [ref=e215]:
              - listitem [ref=e216]:
                - strong [ref=e217]: Timeline bars
                - text: — colored bars representing session activity (different colors for read, write, tool, error, and text parts)
              - listitem [ref=e218]:
                - strong [ref=e219]: Context window progress
                - text: — a three-segment bar showing used, reserved, and available tokens, with a visual indicator when usage exceeds 50%
              - listitem [ref=e220]:
                - strong [ref=e221]: Token breakdown
                - text: — input, output, cache writes, and cache reads display
            - paragraph [ref=e222]:
              - text: You can expand or collapse the graph — your preference is saved in the
              - code [ref=e223]: kilo-code.new.showTaskTimeline
              - text: setting.
            - heading "I like to closely monitor and approve the behavior of the agent. How can I do that better in the new version?" [level=3] [ref=e224]
            - paragraph [ref=e225]:
              - text: We are working to improve the experience in closely managing an agent. Identified improvements and progress are being tracked in a
              - link "GitHub issue" [ref=e226] [cursor=pointer]:
                - /url: https://github.com/Kilo-Org/kilocode/issues/8415
              - text: .
            - paragraph [ref=e227]: "In the meantime we suggest exploring:"
            - list [ref=e228]:
              - listitem [ref=e229]:
                - link "Auto-approval" [ref=e230] [cursor=pointer]:
                  - /url: https://kilo.ai/docs/getting-started/settings/auto-approving-actions
                - text: "of actions: to control what the agent is allowed to do, and require approval when desired"
              - listitem [ref=e231]:
                - link "Agents" [ref=e232] [cursor=pointer]:
                  - /url: https://kilo.ai/docs/code-with-ai/agents/using-agents
                - text: "(previously known as Modes): Managing the agent types in the extension, adding new ones, and setting the default models for each."
            - heading "How can I control which models each agent/mode uses?" [level=3] [ref=e233]
            - paragraph [ref=e234]:
              - text: Modes have been renamed to Agents in the new extension. You can set the default model for each agent in
              - code [ref=e235]: Settings -> Models -> Model per Mode
              - text: . For more information please check the
              - link "agents documentation" [ref=e236] [cursor=pointer]:
                - /url: https://kilo.ai/docs/code-with-ai/agents/using-agents
              - text: .
            - heading "Where is the diff view for file changes?" [level=3] [ref=e237]
            - paragraph [ref=e238]:
              - text: Each message that caused file changes shows a
              - strong [ref=e239]: diff badge
              - text: in the chat — click it to open the Diff Viewer and review what changed. The Agent Manager also includes a built-in diff reviewer that shows every change file by file, in unified or split view. For Markdown files, use the eye/code toggle in the file header to switch between rendered Markdown and the raw diff.
            - heading "How do I do code reviews in the new extension?" [level=3] [ref=e240]
            - paragraph [ref=e241]:
              - text: "You can now trigger local AI-powered code reviews directly by using two commands:"
              - strong [ref=e242]:
                - code [ref=e243]: /local-review
              - text: to review all changes on your current branch vs the base branch, and
              - strong [ref=e244]:
                - code [ref=e245]: /local-review-uncommitted
              - text: to review staged and unstaged changes. See the
              - link "Code Reviews" [ref=e246] [cursor=pointer]:
                - /url: /docs/automate/code-reviews/overview
              - text: documentation for the full setup and options.
            - heading "How can I see the cost of each model?" [level=3] [ref=e247]
            - paragraph [ref=e248]: In the model picker dropdown, click the expand button in the upper-right corner to switch to the full model picker view. From there, click on any model to see its details — including input and output pricing per million tokens, the context window size, and which capabilities the model supports (reasoning, text, images, etc.). This makes it easy to compare costs before selecting a model.
            - heading "How do I set context limits or other parameters for custom models?" [level=3] [ref=e249]
            - paragraph [ref=e250]:
              - text: If you're using a custom model (e.g. via your own API key or a self-hosted provider), you can configure the context window size, max output tokens, and other parameters in your model settings. See the
              - link "Custom Models" [ref=e251] [cursor=pointer]:
                - /url: /docs/code-with-ai/agents/custom-models
              - text: documentation for the full guide on adding and configuring custom models.
            - heading "Where did my custom profiles go?" [level=3] [ref=e252]
            - paragraph [ref=e253]: In the new extension we simplified the model selection by removing the profile layer. To keep models easily reachable you don't need a profile — you can just star them in the model selector to mark them as favorites.
            - heading "Where did orchestrator mode go?" [level=3] [ref=e254]
            - paragraph [ref=e255]:
              - text: Orchestrator mode is deprecated. Agents with full tool access (Code, Plan, Debug) can now
              - strong [ref=e256]: delegate to subagents automatically
              - text: — you no longer need a dedicated orchestrator. Just pick the agent for your task and it will coordinate subagents when helpful. You can also define your own
              - link "custom subagents" [ref=e257] [cursor=pointer]:
                - /url: /docs/customize/custom-subagents
              - text: . See the
              - link "Orchestrator Mode" [ref=e258] [cursor=pointer]:
                - /url: /docs/code-with-ai/agents/orchestrator-mode
              - text: page for the full details on what changed.
