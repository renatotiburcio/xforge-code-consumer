                - /url: https://substackcdn.com/image/fetch/$s_!42Gn!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fd804bd06-0b03-47c4-9acc-e6251706af06_745x757.png
