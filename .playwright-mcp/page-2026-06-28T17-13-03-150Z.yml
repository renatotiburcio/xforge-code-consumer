                    - img [ref=e241]
            - heading "Cross-Platform Sessions Link" [level=3] [ref=e242]:
              - text: Cross-Platform Sessions
              - button "Link" [ref=e245] [cursor=pointer]:
                - img [ref=e246]
            - paragraph [ref=e249]:
              - text: Start a coding session in the CLI while SSHed into a production server. Pick it up in VS Code when you’re back at your desk. Share context with a teammate via Slack. Because the extension and CLI share the same portable core,
              - strong [ref=e250]: session continuity is built into
              - text: how the system works — not a bolt-on feature.
